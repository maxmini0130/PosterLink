name: Daily Crawler

on:
  schedule:
    - cron: "0 1 * * *"   # Every day 01:00 UTC = 10:00 KST
  workflow_dispatch:
    inputs:
      source:
        description: "Collection source slug to crawl. Leave empty for all sources."
        required: false
        type: string
      site:
        description: "Static crawler site id to crawl when no collection source slug is provided."
        required: false
        type: string
      dry_run:
        description: "Run without fetching detail pages or uploading results."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      upload:
        description: "Upload the newest result JSON to Supabase."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: crawler-${{ github.event.inputs.source || github.event.inputs.site || 'all' }}
  cancel-in-progress: true

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: scripts/crawler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/crawler/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate crawler secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_KEY GitHub Actions secrets are required."
            exit 1
          fi

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY GitHub Actions secret is required. The crawler rejects unverified poster images by default."
            exit 1
          fi

          echo "Crawler secrets are configured."
          echo "OpenAI model: ${OPENAI_POSTER_IMAGE_MODEL:-gpt-4o-mini}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_POSTER_IMAGE_MODEL: ${{ secrets.OPENAI_POSTER_IMAGE_MODEL || 'gpt-4o-mini' }}

      - name: Run crawler
        run: |
          ARGS=()
          if [ -n "$CRAWLER_SOURCE" ]; then
            ARGS+=(--source "$CRAWLER_SOURCE")
          elif [ -n "$CRAWLER_SITE" ]; then
            ARGS+=(--site "$CRAWLER_SITE")
          fi

          if [ "$CRAWLER_DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          echo "Running crawler with args: ${ARGS[*]:-(all)}"
          if [ "$CRAWLER_SOURCE" = "youth-seoul" ] || [ "$CRAWLER_SITE" = "youth-seoul" ]; then
            RUN_TIMEOUT="${CRAWLER_YOUTH_SEOUL_TIMEOUT:-45m}"
          elif [ -n "$CRAWLER_SOURCE" ] || [ -n "$CRAWLER_SITE" ]; then
            RUN_TIMEOUT="${CRAWLER_SINGLE_RUN_TIMEOUT:-25m}"
          else
            RUN_TIMEOUT="${CRAWLER_ALL_RUN_TIMEOUT:-150m}"
          fi
          echo "Crawler timeout: $RUN_TIMEOUT"
          timeout --preserve-status "$RUN_TIMEOUT" node src/index.js "${ARGS[@]}"
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          CRAWLER_SOURCE: ${{ github.event.inputs.source || '' }}
          CRAWLER_SITE: ${{ github.event.inputs.site || '' }}
          CRAWLER_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTER_IMAGE_CLASSIFIER: auto
          OPENAI_POSTER_IMAGE_MODEL: ${{ secrets.OPENAI_POSTER_IMAGE_MODEL || 'gpt-4o-mini' }}
          OPENAI_POSTER_CONTENT_MODEL: ${{ secrets.OPENAI_POSTER_CONTENT_MODEL || 'gpt-4o-mini' }}
          POSTER_IMAGE_MIN_CONFIDENCE: "0.65"
          POSTER_IMAGE_RULE_MIN_SCORE: "45"
          OPENAI_REQUEST_TIMEOUT_MS: "45000"
          CRAWLER_SINGLE_RUN_TIMEOUT: "25m"
          CRAWLER_YOUTH_SEOUL_TIMEOUT: "45m"
          CRAWLER_ALL_RUN_TIMEOUT: "150m"

      - name: Upload to Supabase
        run: |
          if [ "$CRAWLER_DRY_RUN" = "true" ] || [ "$CRAWLER_UPLOAD" != "true" ]; then
            echo "Upload skipped. dry_run=$CRAWLER_DRY_RUN upload=$CRAWLER_UPLOAD"
            exit 0
          fi

          FILE=$(ls -t data/results/*.json 2>/dev/null | head -n 1 || true)
          if [ -f "$FILE" ]; then
            echo "Uploading $FILE"
            node src/upload-to-supabase.js "$FILE"
          else
            echo "No result JSON was created"
            ls data/results/ || true
          fi
        env:
          CRAWLER_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          CRAWLER_UPLOAD: ${{ github.event.inputs.upload || 'true' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CRAWLER_USER_ID: ${{ secrets.CRAWLER_USER_ID }}

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawler-results-${{ github.run_id }}
          path: scripts/crawler/data/results/
          retention-days: 7
