name: Daily Crawler

on:
  schedule:
    - cron: "0 1 * * *"   # 매일 01:00 UTC = 한국 10:00 KST
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/crawler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/crawler/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run crawler
        run: node src/index.js
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"   # 일부 사이트 자체서명 인증서 허용

      - name: Upload to Supabase
        run: |
          TODAY=$(date +%Y-%m-%d)
          FILE="data/results/all_${TODAY}.json"
          if [ -f "$FILE" ]; then
            echo "📤 Uploading $FILE"
            node src/upload-to-supabase.js "$FILE"
          else
            echo "⚠️ 결과 파일 없음: $FILE"
            ls data/results/ || true
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CRAWLER_USER_ID: ${{ secrets.CRAWLER_USER_ID }}

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawler-results-${{ github.run_id }}
          path: scripts/crawler/data/results/
          retention-days: 7
